name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. release-0.9.0-beta)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_BRANCH: release

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Ensure tag commit is in release branch
        run: |
          if git branch -r --contains "${GITHUB_SHA}" | grep -Eq "origin/${RELEASE_BRANCH}($|/)"; then
            echo "Tag commit is in release branch."
          else
            echo "Tag commit is NOT in release/* branch. Skipping publish."
            exit 1
          fi

      - name: Resolve version from tag
        shell: bash
        run: |
          VER="${{ inputs.tag }}"
          if [[ "$VER" == v* ]]; then VER="${VER#v}"; fi
          if [[ "$VER" == release-* ]]; then VER="${VER#release-}"; fi
          echo "VER=$VER" >> "$GITHUB_ENV"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Lite.AspNetCore.RequestBinder.sln

      - name: Build
        run: dotnet build Lite.AspNetCore.RequestBinder.sln -c Release --no-restore

      - name: Prep nupkg dir
        run: |
          mkdir -p ./nupkg

      - name: Pack core
        run: |
          dotnet pack "sources/Lite.AspNetCore.RequestBinder/Lite.AspNetCore.RequestBinder.csproj" -c Release -o ./nupkg -p:Version="$VER" -p:TreatWarningsAsErrors=false --verbosity normal

      - name: Pack Body.Json
        run: |
          dotnet pack "sources/Lite.AspNetCore.RequestBinder.Body.Json/Lite.AspNetCore.RequestBinder.Body.Json.csproj" -c Release -o ./nupkg -p:Version="$VER" -p:TreatWarningsAsErrors=false --verbosity normal

      - name: Pack Body.Xml
        run: |
          dotnet pack "sources/Lite.AspNetCore.RequestBinder.Body.Xml/Lite.AspNetCore.RequestBinder.Body.Xml.csproj" -c Release -o ./nupkg -p:Version="$VER" -p:TreatWarningsAsErrors=false --verbosity normal

      - name: Pack Body.MessagePack
        run: |
          dotnet pack "sources/Lite.AspNetCore.RequestBinder.Body.MessagePack/Lite.AspNetCore.RequestBinder.Body.MessagePack.csproj" -c Release -o ./nupkg -p:Version="$VER" -p:TreatWarningsAsErrors=false --verbosity normal

      - name: Pack Body.MemoryPack
        run: |
          dotnet pack "sources/Lite.AspNetCore.RequestBinder.Body.MemoryPack/Lite.AspNetCore.RequestBinder.Body.MemoryPack.csproj" -c Release -o ./nupkg -p:Version="$VER" -p:TreatWarningsAsErrors=false --verbosity normal

      - name: Verify nupkg produced
        run: |
          echo "Packed nupkg:"
          ls -la ./nupkg

          if ! compgen -G "./nupkg/*.nupkg" > /dev/null; then
            echo "::error::No .nupkg files produced."
            exit 1
          fi

      - name: Push packages to NuGet
        shell: bash
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "::error::NUGET_API_KEY is not set in GitHub Secrets."
            exit 1
          fi

          echo "Pushing nupkg files:"
          ls -la ./nupkg

          API_KEY="${{ secrets.NUGET_API_KEY }}"

          echo "NuGet API key is set (${#API_KEY} chars)."

          for f in ./nupkg/*.nupkg; do
            echo "NuGet push: $f"
            dotnet nuget push "$f" --api-key "$API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate --verbosity detailed
          done

