name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - develop
      - release/**

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet: '8.0.x'
            framework: net8.0
          - dotnet: '9.0.x'
            framework: net9.0
          - dotnet: '10.0.x'
            framework: net10.0
            continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore test/Lite.AspNetCore.RequestBinder.Tests/Lite.AspNetCore.RequestBinder.Tests.csproj -p:TargetFramework=${{ matrix.framework }}

      - name: Build
        run: dotnet build test/Lite.AspNetCore.RequestBinder.Tests/Lite.AspNetCore.RequestBinder.Tests.csproj -c Release -f ${{ matrix.framework }} --no-restore

      - name: Test
        run: dotnet test test/Lite.AspNetCore.RequestBinder.Tests/Lite.AspNetCore.RequestBinder.Tests.csproj -c Release -f ${{ matrix.framework }} --no-build --verbosity normal
