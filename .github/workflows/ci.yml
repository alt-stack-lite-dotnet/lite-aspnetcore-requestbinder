name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - develop
      - release/**

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet: '8.0.x'
            framework: net8.0
          - dotnet: '9.0.x'
            framework: net9.0
          - dotnet: '10.0.x'
            framework: net10.0
            continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore
        working-directory: Lite.AspNetCore.RequestBinder

      - name: Build
        run: dotnet build -c Release -f ${{ matrix.framework }} --no-restore
        working-directory: Lite.AspNetCore.RequestBinder

      - name: Test
        run: dotnet test -c Release -f ${{ matrix.framework }} --no-build --verbosity normal
        working-directory: Lite.AspNetCore.RequestBinder
