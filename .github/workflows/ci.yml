name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - develop
      - release/**

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet: '8.0.x'
            framework: net8.0
          - dotnet: '9.0.x'
            framework: net9.0
          - dotnet: '10.0.x'
            framework: net10.0
            continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore test/Lite.AspNetCore.RequestBinder.Tests/Lite.AspNetCore.RequestBinder.Tests.csproj

      - name: Build
        run: dotnet build test/Lite.AspNetCore.RequestBinder.Tests/Lite.AspNetCore.RequestBinder.Tests.csproj -c Release -f ${{ matrix.framework }} --no-restore

      - name: Test
        run: dotnet test test/Lite.AspNetCore.RequestBinder.Tests/Lite.AspNetCore.RequestBinder.Tests.csproj -c Release -f ${{ matrix.framework }} --no-build --verbosity normal

  pack:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    env:
      RELEASE_BRANCH: release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag is on release branch
        run: |
          git fetch origin
          if ! git show-ref -q "refs/remotes/origin/${{ env.RELEASE_BRANCH }}"; then
            echo "::error::Branch '${{ env.RELEASE_BRANCH }}' not found in origin."
            exit 1
          fi
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -Eq "origin/${{ env.RELEASE_BRANCH }}($|/)"; then
            echo "::error::Tag must point to a commit on branch '${{ env.RELEASE_BRANCH }}'."
            exit 1
          fi

      - name: Resolve version from tag
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          if [[ "$VER" == v* ]]; then VER="${VER#v}"; fi
          if [[ "$VER" == release-* ]]; then VER="${VER#release-}"; fi
          echo "VER=$VER" >> "$GITHUB_ENV"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Lite.AspNetCore.RequestBinder.sln

      - name: Build (Release)
        run: dotnet build Lite.AspNetCore.RequestBinder.sln -c Release --no-restore

      - name: Pack
        run: |
          mkdir -p nupkgs
          dotnet pack "sources/Lite.AspNetCore.RequestBinder/Lite.AspNetCore.RequestBinder.csproj" -c Release -o ./nupkgs -p:Version="$VER"
          dotnet pack "sources/Lite.AspNetCore.RequestBinder.Body.Json/Lite.AspNetCore.RequestBinder.Body.Json.csproj" -c Release -o ./nupkgs -p:Version="$VER"
          dotnet pack "sources/Lite.AspNetCore.RequestBinder.Body.Xml/Lite.AspNetCore.RequestBinder.Body.Xml.csproj" -c Release -o ./nupkgs -p:Version="$VER"
          dotnet pack "sources/Lite.AspNetCore.RequestBinder.Body.MessagePack/Lite.AspNetCore.RequestBinder.Body.MessagePack.csproj" -c Release -o ./nupkgs -p:Version="$VER"
          dotnet pack "sources/Lite.AspNetCore.RequestBinder.Body.MemoryPack/Lite.AspNetCore.RequestBinder.Body.MemoryPack.csproj" -c Release -o ./nupkgs -p:Version="$VER"

          echo "Packed nupkgs:"
          ls -la nupkgs

          if ! compgen -G "nupkgs/*.nupkg" > /dev/null; then
            echo "::error::No .nupkg files produced."
            exit 1
          fi

      - name: Push packages to NuGet
        run: |
          for f in nupkgs/*.nupkg; do
            dotnet nuget push "$f" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          done
